<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quà Tặng Em ♡</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
height:100vh;
background:linear-gradient(180deg,#ffd6e7,#ffc0dd);
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
}

#scene{
position:relative;
width:100%;
height:100%;
overflow:hidden;
}

.title{
position:absolute;
top:12%;
left:50%;
transform:translateX(-50%);
font-size:2rem;
font-weight:bold;
color:white;
text-shadow:0 0 10px rgba(255,255,255,.8);
}

.sparkle{
position:absolute;
border-radius:50%;
background:white;
opacity:.7;
animation:float 8s linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:.8;
}
to{
transform:translateY(-20vh);
opacity:0;
}
}

#gift{
position:absolute;
left:50%;
top:58%;
transform:translate(-50%,-50%);
cursor:pointer;
}

.box{
width:180px;
height:140px;
background:#ff4d88;
position:relative;
border-radius:10px;
}

.ribbon-v{
position:absolute;
width:24px;
height:140px;
background:#fff;
left:50%;
transform:translateX(-50%);
}

.ribbon-h{
position:absolute;
width:180px;
height:24px;
background:#fff;
top:58px;
}

.lid{
width:210px;
height:40px;
background:#ff5f96;
position:absolute;
left:-15px;
top:-30px;
border-radius:10px;
transition:1s ease;
}

#videoContainer{
position:absolute;
left:50%;
top:58%;
width:240px;
transform:translate(-50%,-50%) scale(.4);
opacity:0;
z-index:20;
}

#cover{
position:absolute;
inset:0;
background:
radial-gradient(circle,rgba(255,255,255,.85),rgba(255,192,221,.95));
border-radius:18px;
z-index:25;
}

video{
width:100%;
border-radius:18px;
display:block;
}

.open .lid{
transform:translateY(-220px) rotate(-18deg);
}

.flyVideo{
animation:rise 1.4s forwards;
}

@keyframes rise{
0%{
opacity:0;
transform:translate(-50%,-50%) scale(.4);
}
100%{
opacity:1;
transform:translate(-50%,-210%) scale(.8);
}
}

.zoomVideo{
animation:zoom 1.8s forwards;
}

@keyframes zoom{
0%{
transform:translate(-50%,-50%) scale(.8);
}
100%{
transform:translate(-50%,-50%) scale(4);
}
}

.hideGift{
animation:drop .8s forwards;
}

@keyframes drop{
to{
transform:translate(-50%,120vh);
opacity:0;
}
}
</style></head><body><div id="scene"><div class="title">Quà Tặng Em ♡</div><div id="gift">
<div class="lid"></div><div class="box">
<div class="ribbon-v"></div>
<div class="ribbon-h"></div>
</div>
</div><div id="videoContainer"><div id="cover"></div><video id="video" preload="auto">
<source src="video.mp4" type="video/mp4">
</video></div></div><script>

for(let i=0;i<18;i++){

const s=document.createElement("div");

s.className="sparkle";

const size=Math.random()*6+2;

s.style.width=size+"px";
s.style.height=size+"px";
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(Math.random()*4+6)+"s";

document.getElementById("scene").appendChild(s);
}

const gift=document.getElementById("gift");
const video=document.getElementById("video");
const videoContainer=document.getElementById("videoContainer");
const cover=document.getElementById("cover");

gift.addEventListener("click",()=>{

gift.classList.add("open");

setTimeout(()=>{
videoContainer.classList.add("flyVideo");
},600);

setTimeout(()=>{
gift.classList.add("hideGift");
videoContainer.style.top="50%";
videoContainer.style.left="50%";
videoContainer.classList.add("zoomVideo");
},2200);

setTimeout(()=>{
cover.style.display="none";
video.play();
},4000);

},{once:true});

</script></body>
</html>
